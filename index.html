<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icalabs</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* Roxo — acento da Isadora */
  --p9:#1A0A3A;--p8:#2D1560;--p7:#3D1F7A;--p6:#5A2D9E;--p5:#7B4DC0;--p4:#A07FD4;--p3:#C4ADEA;--p2:#DDD0F4;--p1:#F0EAFB;--p0:#FAF8FE;
  /* Neutros quentes — base do design */
  --n9:#1A1714;--n8:#2C2825;--n7:#3D3835;--n6:#5C5450;--n5:#8C837D;--n4:#B5AFA9;--n3:#D4CFC9;--n2:#E8E3DD;--n1:#F2EDE8;--n0:#FAF8F5;
  /* Sistema */
  --bg:#F5F1EC;--sur:#FFFFFF;--bd:#E2DBD3;--bdl:#EDE8E2;
  --t1:#1A1714;--t2:#5C5450;--t3:#A09890;
  --ok:#2D6A4F;--okb:#D4EDE3;--er:#9B2335;--erb:#F9E8EA;--wa:#7A4F00;--wab:#FEF3D8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;font-size:13px;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;letter-spacing:.01em}
button,input,select,textarea{font-family:'Jost',sans-serif}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--n3);border-radius:4px}
#app{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:54px;background:var(--sur);border-bottom:1px solid var(--bdl);flex-shrink:0;box-shadow:0 1px 0 var(--bdl)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:190px;background:var(--sur);border-right:1px solid var(--bdl);padding:12px 8px 24px;display:flex;flex-direction:column;gap:1px;flex-shrink:0;overflow-y:auto}
.main{flex:1;overflow-y:auto;padding:24px 26px;background:var(--bg)}
/* Logo */
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:30px;height:30px;flex-shrink:0}
.logo-name{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;color:var(--n8);letter-spacing:.04em}
.logo-accent{color:var(--p5)}
/* Nav */
.nsec{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:.14em;text-transform:uppercase;padding:14px 11px 5px}
.nbtn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 11px;border-radius:6px;border:none;background:none;color:var(--t2);font-size:12px;font-weight:400;cursor:pointer;text-align:left;transition:all .15s;letter-spacing:.02em}
.nbtn:hover{background:var(--n1);color:var(--n8)}
.nbtn.active{background:var(--p1);color:var(--p6);font-weight:500;border-left:2px solid var(--p5)}
.nicon{width:16px;text-align:center;font-size:12px;flex-shrink:0}
/* Sem selector */
.swrap{margin-left:auto;position:relative;display:flex;gap:5px;align-items:center}
.spill{display:flex;align-items:center;gap:6px;background:var(--n1);border:1px solid var(--n3);border-radius:4px;padding:5px 12px 5px 10px;color:var(--n7);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.03em}
.spill:hover{background:var(--p1);border-color:var(--p3);color:var(--p6)}
.scfg{background:none;border:none;color:var(--t3);font-size:14px;padding:4px 7px;border-radius:4px;cursor:pointer;transition:all .15s}
.scfg:hover{background:var(--n1);color:var(--n7)}
.sdd{position:absolute;right:0;top:calc(100% + 6px);background:var(--sur);border:1px solid var(--bd);border-radius:8px;z-index:60;min-width:210px;overflow:hidden;box-shadow:0 8px 32px rgba(26,23,20,.10)}
.sitem{display:block;width:100%;padding:9px 14px;background:none;border:none;color:var(--t2);text-align:left;font-size:12px;cursor:pointer;transition:background .12s;letter-spacing:.02em}
.sitem:hover,.sitem.on{background:var(--p0);color:var(--p6)}
.sitem.on{font-weight:500}
/* Cards */
.card{background:var(--sur);border:1px solid var(--bdl);border-radius:8px;padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 3px rgba(26,23,20,.04)}
.stitle{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;margin-bottom:14px;color:var(--n8);letter-spacing:.02em}
/* Inputs */
.inp{background:var(--n0);border:1px solid var(--n3);border-radius:5px;padding:7px 11px;color:var(--t1);width:100%;font-size:12.5px;outline:none;transition:border-color .15s;font-family:'Jost',sans-serif;letter-spacing:.02em}
.inp:focus{border-color:var(--p4);background:#fff;box-shadow:0 0 0 3px var(--p1)}
.lbl{font-size:9.5px;color:var(--t3);margin-bottom:3px;display:block;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.fld{margin-bottom:10px}
.row{display:flex;gap:8px}
.fh{flex:1;margin-bottom:10px}
textarea.inp{resize:vertical;min-height:68px;line-height:1.6}
/* Buttons */
.btn{border-radius:4px;padding:7px 14px;font-weight:500;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;border:none;transition:all .15s;letter-spacing:.04em;font-family:'Jost',sans-serif}
.btn-p{background:var(--p6);color:#fff;box-shadow:0 2px 8px rgba(90,45,158,.25)}
.btn-p:hover{background:var(--p7);box-shadow:0 3px 12px rgba(90,45,158,.35)}
.btn-o{background:var(--sur);color:var(--t1);border:1px solid var(--n3)}
.btn-o:hover{background:var(--n1);border-color:var(--n4)}
.btn-g{background:none;color:var(--t3);border:none}
.btn-g:hover{color:var(--t2)}
.btn-sm{padding:3px 10px;font-size:11px;border-radius:3px}
.btn-d{background:var(--erb);color:var(--er);border:1px solid #f0c0c0}
/* Stats */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--sur);border-radius:6px;padding:12px 14px;border:1px solid var(--bdl);box-shadow:0 1px 3px rgba(26,23,20,.04)}
.slbl{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.sval{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;color:var(--p6);line-height:1}
/* Alerts */
.abox{background:var(--wab);border:1px solid #EFC76A;border-left:3px solid var(--wa);border-radius:4px;padding:9px 13px;margin-bottom:12px;font-size:12px;color:var(--wa);letter-spacing:.02em}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(26,23,20,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(4px)}
.modal{background:var(--sur);border-radius:10px;width:100%;max-width:465px;max-height:90vh;overflow-y:auto;padding:24px;border:1px solid var(--bdl);box-shadow:0 20px 60px rgba(26,23,20,.15)}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bdl)}
.mtitle{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--n8);letter-spacing:.02em}
/* Misc */
.cdot{width:22px;height:22px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:transform .12s}
.cdot:hover{transform:scale(1.18)}
.abar{flex:1;max-width:80px;height:4px;background:var(--n2);border-radius:2px;overflow:hidden}
.afill{height:100%;border-radius:2px;transition:width .4s}
.dchip{padding:3px 9px;border-radius:3px;font-size:11px;cursor:pointer;border:1px solid;transition:all .12s;letter-spacing:.02em}
.atvc{display:flex;align-items:flex-start;gap:10px;background:var(--sur);border:1px solid var(--bdl);border-radius:6px;padding:11px 13px;margin-bottom:6px;box-shadow:0 1px 2px rgba(26,23,20,.03)}
.atvc input[type=checkbox]{margin-top:3px;width:14px;height:14px;accent-color:var(--p5);cursor:pointer;flex-shrink:0}
.anotes{font-size:11px;color:var(--t3);margin-top:4px;background:var(--n0);border-radius:4px;padding:6px 9px;white-space:pre-wrap;line-height:1.6;border:1px solid var(--bdl)}
.gwrap{background:var(--n0);border-radius:6px;padding:11px 13px;min-width:110px;border:1px solid var(--bdl)}
.wktbl{width:100%;border-collapse:collapse;font-size:11.5px}
.wktbl th,.wktbl td{padding:5px 6px;border-bottom:1px solid var(--bdl)}
.wktbl th{font-weight:600;color:var(--t3);text-align:center;font-size:10px;letter-spacing:.07em;text-transform:uppercase}
.wktbl th:first-child{text-align:left;width:70px}
.scell{border-radius:0 3px 3px 0;padding:4px 8px;border-left:2px solid}
.pill{display:inline-block;padding:2px 9px;border-radius:2px;font-size:10px;font-weight:500;letter-spacing:.04em}
.empty{border:1px dashed var(--n3);border-radius:6px;padding:28px;text-align:center;color:var(--t3);font-size:13px;letter-spacing:.02em}
/* Doc editor */
.tbtn{background:none;border:1px solid transparent;border-radius:3px;padding:3px 8px;font-size:12px;color:var(--t2);cursor:pointer;transition:all .12s;min-width:26px;line-height:1.5;font-family:'Jost',sans-serif}
.tbtn:hover{background:var(--p0);border-color:var(--p2);color:var(--p6)}
#doc-ce h1{font-size:24px;font-weight:400;color:var(--n8);margin:16px 0 8px;font-family:'Cormorant Garamond',serif;letter-spacing:.02em}
#doc-ce h2{font-size:17px;font-weight:500;color:var(--p7);margin:13px 0 5px;font-family:'Cormorant Garamond',serif}
#doc-ce h3{font-size:14px;font-weight:500;color:var(--n6);margin:11px 0 4px}
#doc-ce p{margin:0 0 8px;line-height:1.85}
#doc-ce ul,#doc-ce ol{margin:5px 0 10px 20px;line-height:1.85}
#doc-ce blockquote{border-left:2px solid var(--p4);padding:6px 14px;margin:10px 0;color:var(--t2);background:var(--p0);border-radius:0 4px 4px 0;font-style:italic}
#doc-ce strong{color:var(--p7)}
#doc-ce:focus{outline:none}
#doc-ce:empty:before{content:attr(data-ph);color:var(--t3);pointer-events:none}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">
      <svg class="logo-mark" viewBox="0 0 30 30" fill="none">
        <rect x="2" y="2" width="26" height="26" rx="6" fill="#F0EAF8"/>
        <rect x="2" y="2" width="26" height="26" rx="6" stroke="#C4ADEA" stroke-width="1"/>
        <path d="M9 21 L9 10 Q9 8 11 8 L19 8 Q22 8 22 11 L22 13 Q22 15 19 15 L11 15" stroke="#5A2D9E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M9 15 L20 15" stroke="#A07FD4" stroke-width="1" stroke-linecap="round"/>
        <path d="M9 18 L17 18" stroke="#A07FD4" stroke-width="1" stroke-linecap="round"/>
        <path d="M9 21 L15 21" stroke="#C4ADEA" stroke-width="1" stroke-linecap="round"/>
      </svg>
      <span class="logo-name">Ica<span class="logo-accent">labs</span></span>
    </div>
    <!-- Export / Import -->
    <div style="display:flex;gap:4px;align-items:center;margin-left:10px">
      <button onclick="exportData()" title="Exportar backup dos seus dados" style="display:flex;align-items:center;gap:4px;background:none;border:1px solid var(--n3);border-radius:4px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--n5);cursor:pointer;font-family:'Jost',sans-serif;letter-spacing:.03em;transition:all .15s" onmouseover="this.style.background='var(--n1)';this.style.color='var(--n7)'" onmouseout="this.style.background='none';this.style.color='var(--n5)'">↓ Exportar</button>
      <button onclick="importData()" title="Importar backup salvo anteriormente" style="display:flex;align-items:center;gap:4px;background:none;border:1px solid transparent;border-radius:4px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--n5);cursor:pointer;font-family:'Jost',sans-serif;letter-spacing:.03em;transition:all .15s" onmouseover="this.style.background='var(--n1)';this.style.color='var(--n7)'" onmouseout="this.style.background='none';this.style.color='var(--n5)'">↑ Importar</button>
    </div>
    <div class="swrap" id="swrap">
      <button class="scfg" onclick="openSemCfg()" title="Configurar">⚙</button>
      <button class="spill" onclick="toggleDD()">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.3"/><path d="M6 3.5v2.7l1.7.9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="slbl">...</span>
        <span style="font-size:9px;opacity:.55">▾</span>
      </button>
      <div class="sdd" id="sdd" style="display:none"></div>
    </div>
  </div>
  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main" id="main"></main>
  </div>
</div>
<div class="overlay" id="ov" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="mb"></div>
</div>

<script>
// ── constants ─────────────────────────────────────────────────────────────────
const SCOLS=['#6030A8','#276A47','#9A6238','#B83232','#0E6B9A','#A85F00','#A83275','#3A6E6E'];
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const TODAY=new Date().toISOString().slice(0,10);
const uid=()=>Math.random().toString(36).slice(2,9);
const fmt=d=>d?d.slice(8,10)+'/'+d.slice(5,7):'';
const fmtF=d=>d?d.slice(8,10)+'/'+d.slice(5,7)+'/'+d.slice(0,4):'';
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── state ─────────────────────────────────────────────────────────────────────
const SK='acad_v11';
function lsLoad(){try{return JSON.parse(localStorage.getItem(SK));}catch{return null;}}
function lsSave(){try{localStorage.setItem(SK,JSON.stringify({sems:A.sems,activeId:A.activeId}));}catch{}}
const mkSem=n=>({id:uid(),name:n||'1º Semestre 2026',startDate:'2026-02-01',endDate:'2026-06-30',passingGrade:6,subjects:[],assignments:[],exams:[],holidays:[],attendance:{},gradeConfigs:{},gradeValues:{},docs:[],pages:[]});
const stored=lsLoad();
const A={sems:stored?.sems||[mkSem()],activeId:stored?.activeId||null,tab:'dashboard'};
function sem(){return(A.activeId&&A.sems.find(s=>s.id===A.activeId))||A.sems[0];}
function updSem(fn){const s=sem(),id=s.id;A.sems=A.sems.map(x=>x.id===id?fn({...x}):x);lsSave();render();}
function render(){rSidebar();rMain();document.getElementById('slbl').textContent=sem()?.name||'';document.getElementById('sdd').style.display='none';}

// ── math ──────────────────────────────────────────────────────────────────────
function dBetween(s,e,dow){if(!s||!e)return[];const r=[],c=new Date(s+'T12:00'),ee=new Date(e+'T12:00');while(c.getDay()!==dow)c.setDate(c.getDate()+1);while(c<=ee){r.push(c.toISOString().slice(0,10));c.setDate(c.getDate()+7);}return r;}
function subDates(sub,sm){const seen=new Set(),all=[];for(const sl of(sub.schedule||[])){for(const d of dBetween(sm.startDate,sm.endDate,sl.day)){if(!seen.has(d)&&!(sm.holidays||[]).includes(d)){seen.add(d);all.push(d);}}}return all.sort();}
function absStats(sub,sm){const dates=subDates(sub,sm),att=(sm.attendance||{})[sub.id]||{};const total=dates.length,max=Math.floor(total*.25),used=dates.filter(d=>att[d]).length;return{total,max,used,rem:max-used,dates};}
function gAvg(cfgs,vals){if(!cfgs?.length)return null;let n=0,d=0;for(const c of cfgs){const v=vals?.[c.id];if(v!==''&&v!=null&&!isNaN(+v)){n+=+v*c.weight;d+=c.weight;}}return d>0?+(n/d).toFixed(2):null;}
function gNeeded(cfgs,vals,pass){if(!cfgs?.length)return null;let earn=0,tot=0,miss=0;for(const c of cfgs){tot+=c.weight;const v=vals?.[c.id];if(v!==''&&v!=null&&!isNaN(+v))earn+=+v*c.weight;else miss+=c.weight;}return miss?+Math.max(0,(pass*tot-earn)/miss).toFixed(2):null;}

// ── sidebar ───────────────────────────────────────────────────────────────────
const TABS=[
  {id:'dashboard',label:'Início',ic:'⌂'},
  {id:'materias',label:'Matérias',ic:'◉'},
  {id:'atividades',label:'Trabalhos',ic:'✎'},
  {id:'provas',label:'Provas',ic:'◈'},
  {id:'horario',label:'Horário',ic:'▦'},
  {id:'faltas',label:'Faltas',ic:'◎'},
  {id:'notas',label:'Notas',ic:'◆'},
  {id:'resumos',label:'Resumos',ic:'📄'},
  {id:'caderno',label:'Caderno',ic:'✏'},
];
function rSidebar(){
  document.getElementById('sidebar').innerHTML=
    '<div class="nsec">Menu</div>'+
    TABS.map(t=>`<button class="nbtn${A.tab===t.id?' active':''}" onclick="goTab('${t.id}')"><span class="nicon">${t.ic}</span>${t.label}</button>`).join('');
}
function goTab(t){A.tab=t;rSidebar();rMain();}

// ── semester dropdown ─────────────────────────────────────────────────────────
function toggleDD(){
  const d=document.getElementById('sdd');
  if(d.style.display==='none'){
    d.innerHTML=A.sems.map(s=>`<button class="sitem${s.id===sem()?.id?' on':''}" onclick="switchSem('${s.id}')">${esc(s.name)}</button>`).join('')+
    `<div style="border-top:1px solid var(--bdl);padding:6px 8px"><button class="btn btn-g btn-sm" style="width:100%;color:var(--p5);font-weight:500" onclick="newSemPrompt()">+ Novo semestre</button></div>`;
    d.style.display='block';
  }else d.style.display='none';
}
function switchSem(id){A.activeId=id;lsSave();render();}
function newSemPrompt(){const n=prompt('Nome do novo semestre:');if(!n?.trim())return;const s=mkSem(n.trim());A.sems.push(s);A.activeId=s.id;lsSave();render();}
document.addEventListener('click',e=>{if(!document.getElementById('swrap').contains(e.target))document.getElementById('sdd').style.display='none';});

// ── modal ─────────────────────────────────────────────────────────────────────
function openModal(html){document.getElementById('mb').innerHTML=html;document.getElementById('ov').style.display='flex';}
function closeModal(){document.getElementById('ov').style.display='none';}

// ── semester config ───────────────────────────────────────────────────────────
function openSemCfg(){
  const s=sem();
  openModal(`<div class="mhead"><span class="mtitle">Configurar espaço</span><button class="btn btn-g btn-sm" onclick="closeModal()">✕</button></div>
  <div class="fld"><label class="lbl">Nome</label><input class="inp" id="sc-n" value="${esc(s.name)}"/></div>
  <div class="row">
    <div class="fh"><label class="lbl">Início</label><input class="inp" type="date" id="sc-s" value="${s.startDate||''}"/></div>
    <div class="fh"><label class="lbl">Término</label><input class="inp" type="date" id="sc-e" value="${s.endDate||''}"/></div>
  </div>
  <div class="fld"><label class="lbl">Nota mínima para aprovação</label><input class="inp" type="number" id="sc-p" min="0" max="10" step="0.5" value="${s.passingGrade||6}" style="width:85px"/></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid var(--bdl)">
    <button class="btn btn-d btn-sm" onclick="if(confirm('Deletar este espaço?'))delSem()">🗑 Deletar</button>
    <div style="display:flex;gap:7px"><button class="btn btn-o" onclick="closeModal()">Cancelar</button><button class="btn btn-p" onclick="saveSemCfg()">Salvar</button></div>
  </div>`);
}
function saveSemCfg(){updSem(s=>({...s,name:document.getElementById('sc-n').value.trim()||s.name,startDate:document.getElementById('sc-s').value,endDate:document.getElementById('sc-e').value,passingGrade:+document.getElementById('sc-p').value}));closeModal();}
function delSem(){if(A.sems.length<=1){alert('Precisa ter ao menos um espaço.');return;}A.sems=A.sems.filter(x=>x.id!==sem().id);A.activeId=A.sems[0].id;lsSave();closeModal();render();}

// ── main dispatcher ───────────────────────────────────────────────────────────
function rMain(){
  const fn={dashboard:rDash,materias:rMaterias,atividades:rAtividades,provas:rProvas,horario:rHorario,faltas:rFaltas,notas:rNotas,resumos:rResumos,caderno:rCaderno};
  document.getElementById('main').innerHTML=(fn[A.tab]||rDash)();
}

// ═══════════════════════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function rDash(){
  const s=sem();
  const pending=(s.assignments||[]).filter(a=>!a.done).sort((a,b)=>(a.deadline||'zzz').localeCompare(b.deadline||'zzz')).slice(0,4);
  const upExams=(s.exams||[]).filter(e=>(e.date||'')>=TODAY).sort((a,b)=>(a.date||'').localeCompare(b.date||'')).slice(0,4);
  const alerts=(s.subjects||[]).filter(sub=>{const st=absStats(sub,s);return st.rem<=1&&st.total>0;});
  const sm=Object.fromEntries((s.subjects||[]).map(x=>[x.id,x]));
  const todayDow=new Date().getDay();
  const days=[1,2,3,4,5];
  if((s.subjects||[]).some(x=>x.schedule?.some(sl=>sl.day===6)))days.push(6);

function delSubj(id){if(!confirm('Remover esta matéria?'))return;updSem(s=>({...s,subjects:s.subjects.filter(x=>x.id!==id)}));}
function openSubjM(id){
  const s=sem(),sub=id?s.subjects.find(x=>x.id===id):null;

  </div>`);

function slotRow(sl,i){return`<div id="slot-${i}" style="display:flex;gap:4px;align-items:center;margin-bottom:5px;background:var(--n0);border:1px solid var(--bdl);border-radius:8px;padding:6px 8px;flex-wrap:wrap">
  <select class="inp" style="width:67px;padding:4px 3px" id="sl-d-${i}">${DAYS.map((d,di)=>`<option value="${di}"${sl.day==di?' selected':''}>${d}</option>`).join('')}</select>

</div>`;}
function addSlot(){const w=document.getElementById('sm-slots'),i=w.querySelectorAll('[id^=slot-]').length,div=document.createElement('div');div.innerHTML=slotRow({day:1,startTime:'08:00',endTime:'10:00',room:''},i);w.appendChild(div.firstElementChild);}
function rmSlot(i){const el=document.getElementById('slot-'+i);if(el&&document.querySelectorAll('[id^=slot-]').length>1)el.remove();}
function pickCol(c){document.getElementById('sm-c').value=c;document.querySelectorAll('#sm-cols .cdot').forEach(d=>{d.style.outline=d.style.background===c?'2.5px solid var(--p8)':'none';});}
function saveSubj(id){
  const name=document.getElementById('sm-n').value.trim();if(!name)return;
  const color=document.getElementById('sm-c').value,prof=document.getElementById('sm-p').value;
  const els=document.querySelectorAll('[id^=slot-]'),schedule=[];
  els.forEach((_,i)=>{const day=document.getElementById('sl-d-'+i)?.value;if(day!=null)schedule.push({day:+day,startTime:document.getElementById('sl-s-'+i)?.value||'08:00',endTime:document.getElementById('sl-e-'+i)?.value||'10:00',room:document.getElementById('sl-r-'+i)?.value||''});});
  const sub={id:id||uid(),name,professor:prof,color,schedule};
  updSem(s=>{const ex=s.subjects.find(x=>x.id===sub.id);return{...s,subjects:ex?s.subjects.map(x=>x.id===sub.id?sub:x):[...s.subjects,sub]};});closeModal();
}

let _af='all';
function rAtividades(){
  const s=sem();let items=s.assignments||[];
  if(_af==='pending')items=items.filter(a=>!a.done);
  if(_af==='done')items=items.filter(a=>a.done);
  items=items.sort((a,b)=>(a.deadline||'zzz').localeCompare(b.deadline||'zzz'));
  const sm=Object.fromEntries((s.subjects||[]).map(x=>[x.id,x]));
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px">

  </div>
  <div style="display:flex;gap:4px;margin-bottom:11px">
    ${['all','pending','done'].map(f=>`<button class="btn btn-sm" style="${_af===f?'background:var(--p6);color:#fff':'background:var(--n0);color:var(--t2);border:1px solid var(--n2)'}" onclick="setAF('${f}')">${f==='all'?'Todos':f==='pending'?'Pendentes':'Concluídos'}</button>`).join('')}
  </div>
  ${!items.length?`<div class="empty">Nenhuma atividade aqui.</div>`:

        ${sub?`<span class="pill" style="background:${sub.color}15;color:${sub.color}">${esc(sub.name)}</span>`:''}
        ${a.deadline?`<span style="font-size:10.5px;color:${over?'var(--er)':'var(--t3)'}">${fmt(a.deadline)}${over?' · atrasado':''}</span>`:''}

      ${a.description?`<div style="font-size:11px;color:var(--t3);margin-top:3px">${esc(a.description)}</div>`:''}

  </div>`;}).join('')}`;
}

  updSem(s=>{const ex=s.exams.find(x=>x.id===e.id);return{...s,exams:ex?s.exams.map(x=>x.id===e.id?e:x):[...s.exams,e]};});closeModal();

// HORÁRIO
// ═══════════════════════════════════════════════════════════════════════════════
function rHorario(){
  const s=sem();const days=[1,2,3,4,5];
  if((s.subjects||[]).some(x=>x.schedule?.some(sl=>sl.day===6)))days.push(6);
  const slotSet=new Set();(s.subjects||[]).forEach(sub=>(sub.schedule||[]).forEach(sl=>slotSet.add(sl.startTime+'|'+sl.endTime)));
  const slots=[...slotSet].sort().map(x=>{const[st,et]=x.split('|');return{st,et};});
  if(!s.subjects?.length||!slots.length)return`<h2 class="stitle">Grade de horários</h2><div class="empty">Cadastre matérias com horários para ver a grade aqui.</div>`;
  const tdow=new Date().getDay();
  const gCell=(day,st,et)=>(s.subjects||[]).find(sub=>sub.schedule?.some(sl=>sl.day===day&&sl.startTime===st&&sl.endTime===et));
  return`<h2 class="stitle">Grade de horários — ${esc(s.name)}</h2>
  <div class="card" style="overflow-x:auto;padding:15px 17px">
    <table class="wktbl">
      <thead><tr>
        <th style="text-align:left;color:var(--t3)">Horário</th>
        ${days.map(d=>`<th style="color:${d===tdow?'var(--p6)':'var(--t3)'};${d===tdow?'background:var(--p0);border-radius:5px 5px 0 0':''}">${DAYS[d]}${d===tdow?' ★':''}</th>`).join('')}
      </tr></thead>
      <tbody>${slots.map(({st,et})=>`<tr>
        <td style="font-size:10px;color:var(--t3);white-space:nowrap;line-height:1.35;padding:5px 6px">${st}<br>${et}</td>
        ${days.map(d=>{const sub=gCell(d,st,et);const sl=sub?.schedule?.find(x=>x.day===d&&x.startTime===st);return`<td style="padding:4px;${d===tdow?'background:var(--p0)':''}">
          ${sub?`<div class="scell" style="background:${sub.color}14;border-left-color:${sub.color}"><div style="font-size:11px;font-weight:700;color:${sub.color}">${esc(sub.name)}</div>${sl?.room?`<div style="font-size:9.5px;color:var(--t3)">${esc(sl.room)}</div>`:''}</div>`:''}</td>`;}).join('')}
      </tr>`).join('')}</tbody>
    </table>
  </div>`;
}

          <span style="font-size:12px;font-weight:700;color:${bc};min-width:95px;text-align:right">${st.used}/${st.max} · ${Math.max(0,st.rem)} restam</span>

      </div>
      ${isE?`<div style="padding:10px 13px 13px;border-top:1px solid var(--bdl)">

function togFE(id){_fe=_fe===id?null:id;rMain();}
function addHol(){const v=document.getElementById('fl-h')?.value;if(!v)return;updSem(s=>({...s,holidays:[...new Set([...(s.holidays||[]),v])]}));}

function togAbs(sid,date){updSem(s=>{const att={...(s.attendance||{})};att[sid]={...(att[sid]||{}),[date]:!att[sid]?.[date]};return{...s,attendance:att};});}

function updGV(sid,cid,val){const s=sem();if(!s.gradeValues)s.gradeValues={};if(!s.gradeValues[sid])s.gradeValues[sid]={};s.gradeValues[sid][cid]=val;lsSave();}

    <button class="tbtn" onclick="docFmt('justifyCenter')">≡</button>
    <button class="tbtn" onclick="docFmt('justifyRight')">➡</button>
    <div style="width:1px;background:var(--bd);margin:2px 4px;height:16px"></div>
    <button class="tbtn" onclick="docFmt('removeFormat')" style="color:var(--er);font-size:11px">✕ fmt</button>
  </div>
  <div id="doc-ce" contenteditable="true" spellcheck="true" data-ph="Comece a escrever seu resumo..."
    style="min-height:460px;max-height:calc(100vh - 220px);background:var(--sur);border:1px solid var(--bdl);border-radius:0 0 10px 10px;padding:20px 26px;font-size:14px;line-height:1.85;color:var(--t1);overflow-y:auto">
  </div>`;
}
function docFmt(cmd,val){document.getElementById('doc-ce')?.focus();document.execCommand(cmd,false,val||null);schedDoc();}
function importFromClaude(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json,.acad';
  inp.onchange=ev=>{
    const file=ev.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(data.type!=='academico_resumo'){alert('Arquivo inválido. Peça ao Claude para gerar um resumo no formato correto.');return;}
        const s=sem();
        // Try to match subject by name
        let subjectId='';
        if(data.subject){const found=(s.subjects||[]).find(x=>x.name.toLowerCase()===data.subject.toLowerCase());if(found)subjectId=found.id;}
        const doc={
          id:uid(),
          title:data.title||'Resumo importado',
          content:data.content||'',
          subjectId,
          fromClaude:true,
          updatedAt:new Date().toISOString()
        };
        updSem(s=>({...s,docs:[...(s.docs||[]),doc]}));
        _docId=doc.id;rMain();
      }catch(err){alert('Erro ao ler o arquivo: '+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}
function newDoc(){
  const doc={id:uid(),title:'',content:'',subjectId:'',updatedAt:new Date().toISOString()};
  updSem(s=>({...s,docs:[...(s.docs||[]),doc]}));_docId=doc.id;rMain();
}
function delDoc(id){if(!confirm('Deletar este resumo?'))return;if(_docId===id)_docId=null;updSem(s=>({...s,docs:(s.docs||[]).filter(d=>d.id!==id)}));}
function schedDoc(){
  const el=document.getElementById('doc-sv');if(el){el.textContent='salvando...';el.style.color='var(--t3)';}
  clearTimeout(_docTimer);_docTimer=setTimeout(saveDoc,700);
}
function saveDoc(){
  if(!_docId)return;
  const title=document.getElementById('doc-ti')?.value||'';
  const content=document.getElementById('doc-ce')?.innerHTML||'';
  const subjectId=document.getElementById('doc-su')?.value||'';
  const s=sem();if(!(s.docs||[]).find(d=>d.id===_docId))return;
  A.sems=A.sems.map(x=>x.id===s.id?{...x,docs:(x.docs||[]).map(d=>d.id===_docId?{...d,title,content,subjectId,updatedAt:new Date().toISOString()}:d)}:x);
  lsSave();
  const el=document.getElementById('doc-sv');if(el){el.textContent='✓ salvo';el.style.color='var(--ok)';}
}

// ── HTML DOCS ─────────────────────────────────────────────────────────────────
function rHtmlViewer(s,htmlDocs){
  const doc=htmlDocs.find(d=>d.id===_htmlDocId);
  if(!doc){_htmlDocId=null;return rResumos();}
  setTimeout(()=>{
    const fr=document.getElementById('html-frame');
    if(fr){const blob=new Blob([doc.htmlContent],{type:'text/html'});fr.src=URL.createObjectURL(blob);}
  },30);
  return`<div style="display:flex;align-items:center;gap:9px;margin-bottom:10px;flex-wrap:wrap">
    <button class="btn btn-o btn-sm" onclick="_htmlDocId=null;rMain()">← Voltar</button>
    <span style="font-size:15px;font-weight:700;color:var(--p8);flex:1">${esc(doc.title||'Resumo')}</span>
    <span style="font-size:11px;color:var(--ok)">✦ Página interativa</span>
  </div>
  <iframe id="html-frame" style="width:100%;height:calc(100vh - 130px);border:1px solid var(--bdl);border-radius:10px;background:#fff" sandbox="allow-scripts allow-same-origin"></iframe>`;
}
function importHtmlDoc(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.html,.htm';
  inp.onchange=ev=>{
    const file=ev.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      const htmlContent=e.target.result;
      const titleMatch=htmlContent.match(/<title[^>]*>([^<]+)<\/title>/i);
      const h1Match=htmlContent.match(/<h1[^>]*>([^<]+)<\/h1>/i);
      const title=(titleMatch?.[1]||h1Match?.[1]||file.name.replace('.html','')).trim();
      const s=sem();
      let subjectId='';
      const subMatch=(s.subjects||[]).find(x=>title.toLowerCase().includes(x.name.toLowerCase()));
      if(subMatch)subjectId=subMatch.id;
      const doc={id:uid(),title,htmlContent,subjectId,updatedAt:new Date().toISOString()};
      updSem(s=>({...s,htmlDocs:[...(s.htmlDocs||[]),doc]}));
      _htmlDocId=doc.id;rMain();
    };
    reader.readAsText(file);
  };
  inp.click();
}
function delHtmlDoc(id){
  if(!confirm('Deletar este resumo HTML?'))return;
  if(_htmlDocId===id)_htmlDocId=null;
  updSem(s=>({...s,htmlDocs:(s.htmlDocs||[]).filter(d=>d.id!==id)}));
}

// ═══════════════════════════════════════════════════════════════════════════════
// CADERNO — canvas livre tipo GoodNotes
// ═══════════════════════════════════════════════════════════════════════════════
let _pi=0,_ctool='pen',_pcol='#2E1065',_psz=3,_drawing=false,_lx=0,_ly=0,_dirty=false,_history=[];
let _cvs=null,_ctx=null;
const PK='acad_pg_v1';
const pk=(sid,pid)=>PK+'_'+sid+'_'+pid;
function pgLoad(k){try{return localStorage.getItem(k);}catch{return null;}}
function pgSave(k,v){try{localStorage.setItem(k,v);}catch{alert('Armazenamento cheio. Exporte ou limpe algumas páginas.');}}

function rCaderno(){
  const s=sem();let pages=s.pages||[];
  if(!pages.length){
    const p={id:uid(),name:'Página 1'};
    A.sems=A.sems.map(x=>x.id===s.id?{...x,pages:[p]}:x);lsSave();pages=[p];
  }
  if(_pi>=pages.length)_pi=0;
  const page=pages[_pi];
  setTimeout(()=>initCvs(s,page),40);
  const COLS=['#2E1065','#6030A8','#9A6238','#B83232','#276A47','#0E6B9A','#A85F00','#D4A0D4','#1a1a1a','#FFFFFF'];
  const SIZES=[2,4,7,13,22];
  return`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;flex-wrap:wrap;gap:7px">
    <h2 class="stitle" style="margin:0">Caderno</h2>
    <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">
      ${pages.map((p,i)=>`<button class="btn btn-sm" style="${i===_pi?'background:var(--p6);color:#fff':'background:var(--sur);border:1px solid var(--bd);color:var(--t2)'}" onclick="pgSwitch(${i})">${esc(p.name)}</button>`).join('')}
      <button class="btn btn-sm btn-o" onclick="pgAdd()" style="font-weight:700">+</button>
    </div>
  </div>
  <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:7px 11px;background:var(--sur);border:1px solid var(--bdl);border-radius:9px;margin-bottom:8px">
    <div style="display:flex;gap:3px">
      <button class="btn btn-sm ${_ctool==='pen'?'btn-p':'btn-o'}" onclick="setCtool('pen')">✏ Caneta</button>
      <button class="btn btn-sm ${_ctool==='hl'?'btn-p':'btn-o'}" onclick="setCtool('hl')">🟡 Realce</button>
      <button class="btn btn-sm ${_ctool==='eraser'?'btn-p':'btn-o'}" onclick="setCtool('eraser')">◻ Borracha</button>
    </div>
    <div style="width:1px;background:var(--bd);height:20px"></div>
    <div style="display:flex;gap:5px;align-items:center">
      ${COLS.map(c=>`<div onclick="setPcol('${c}')" style="width:18px;height:18px;border-radius:50%;background:${c};cursor:pointer;outline:${_pcol===c?'2.5px solid var(--p7)':'1.5px solid var(--bd)'};outline-offset:1.5px;flex-shrink:0;transition:transform .1s;${c==='#FFFFFF'?'border:1px solid var(--bd)':''}" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform=''"></div>`).join('')}
    </div>
    <div style="width:1px;background:var(--bd);height:20px"></div>
    <div style="display:flex;gap:4px;align-items:center">
      ${SIZES.map(sz=>`<button onclick="setPsz(${sz})" title="${sz}px" style="width:27px;height:27px;border-radius:50%;background:${_psz===sz?'var(--p6)':'var(--sur)'};border:1.5px solid ${_psz===sz?'var(--p6)':'var(--bd)'};cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s">
        <div style="width:${Math.min(sz,13)}px;height:${Math.min(sz,13)}px;border-radius:50%;background:${_psz===sz?'#fff':'var(--t2)'}"></div>
      </button>`).join('')}
    </div>
    <div style="width:1px;background:var(--bd);height:20px"></div>
    <div style="display:flex;gap:4px;margin-left:auto;flex-wrap:wrap">
      <button class="btn btn-sm btn-o" onclick="cvUndo()">↩ Desfazer</button>
      <button class="btn btn-sm btn-o" onclick="cvClear()">🗑 Limpar</button>
      <button class="btn btn-sm btn-o" onclick="cvExport()">⬇ PNG</button>
      ${pages.length>1?`<button class="btn btn-sm btn-d" onclick="pgDel()">✕ Página</button>`:''}
    </div>
  </div>
  <div id="cv-wrap" style="background:#FFF;border:1px solid var(--bdl);border-radius:10px;overflow:hidden;cursor:crosshair;box-shadow:0 2px 12px rgba(46,16,101,.06)">
    <canvas id="cv" style="display:block;touch-action:none"></canvas>
  </div>
  <div style="text-align:right;font-size:10px;color:var(--t3);margin-top:5px">Salvo automaticamente · exporte como PNG para compartilhar</div>`;
}

function initCvs(s,page){
  const cvs=document.getElementById('cv');if(!cvs)return;
  _cvs=cvs;
  const wrap=document.getElementById('cv-wrap');
  const W=wrap?wrap.clientWidth:880,H=Math.max(500,Math.floor(W*.6));
  cvs.width=W;cvs.height=H;
  _ctx=cvs.getContext('2d');
  _ctx.fillStyle='#FFFFFF';_ctx.fillRect(0,0,W,H);
  // Subtle grid
  _ctx.strokeStyle='#F0EAE2';_ctx.lineWidth=0.5;
  for(let x=40;x<W;x+=40){_ctx.beginPath();_ctx.moveTo(x,0);_ctx.lineTo(x,H);_ctx.stroke();}
  for(let y=40;y<H;y+=40){_ctx.beginPath();_ctx.moveTo(0,y);_ctx.lineTo(W,y);_ctx.stroke();}
  // Load saved
  const saved=pgLoad(pk(s.id,page.id));
  if(saved){const img=new Image();img.onload=()=>{_ctx.drawImage(img,0,0,W,H);_history=[cvs.toDataURL('image/jpeg',.75)];};img.src=saved;}
  else _history=[cvs.toDataURL('image/jpeg',.75)];
  // Events
  cvs.onmousedown=e=>cvStart(e);
  cvs.onmousemove=e=>cvDraw(e);
  cvs.onmouseup=()=>cvEnd(s,page);
  cvs.onmouseleave=()=>cvEnd(s,page);
  cvs.ontouchstart=e=>{e.preventDefault();cvStart(e.touches[0]);};
  cvs.ontouchmove=e=>{e.preventDefault();cvDraw(e.touches[0]);};
  cvs.ontouchend=e=>{e.preventDefault();cvEnd(s,page);};
}
function cvXY(e){const r=_cvs.getBoundingClientRect();return{x:(e.clientX-r.left)*(_cvs.width/r.width),y:(e.clientY-r.top)*(_cvs.height/r.height)};}
function cvStart(e){
  _drawing=true;const p=cvXY(e);_lx=p.x;_ly=p.y;_dirty=true;
  if(_history.length>12)_history.shift();
  _history.push(_cvs.toDataURL('image/jpeg',.75));
}
function cvDraw(e){
  if(!_drawing||!_ctx)return;
  const p=cvXY(e);
  _ctx.beginPath();
  if(_ctool==='eraser'){_ctx.globalCompositeOperation='destination-out';_ctx.strokeStyle='rgba(0,0,0,1)';_ctx.lineWidth=_psz*5;}
  else if(_ctool==='hl'){_ctx.globalCompositeOperation='source-over';_ctx.strokeStyle=_pcol+'60';_ctx.lineWidth=_psz*4;}
  else{_ctx.globalCompositeOperation='source-over';_ctx.strokeStyle=_pcol;_ctx.lineWidth=_psz;}
  _ctx.lineCap='round';_ctx.lineJoin='round';
  _ctx.moveTo(_lx,_ly);_ctx.lineTo(p.x,p.y);_ctx.stroke();
  _lx=p.x;_ly=p.y;
}
function cvEnd(s,page){
  if(!_drawing)return;_drawing=false;
  if(_ctx)_ctx.globalCompositeOperation='source-over';
  if(_dirty){cvAutoSave(s,page);_dirty=false;}
}
function cvAutoSave(s,page){if(!_cvs)return;try{pgSave(pk(s.id,page.id),_cvs.toDataURL('image/jpeg',.68));}catch(err){}}
function setCtool(t){_ctool=t;rMain();}
function setPcol(c){_pcol=c;rMain();}
function setPsz(sz){_psz=sz;rMain();}
function cvUndo(){
  if(_history.length<=1||!_ctx||!_cvs)return;
  _history.pop();
  const img=new Image();
  img.onload=()=>{
    _ctx.clearRect(0,0,_cvs.width,_cvs.height);
    _ctx.drawImage(img,0,0,_cvs.width,_cvs.height);
    const s=sem(),pages=s.pages||[];
    if(_pi<pages.length)cvAutoSave(s,pages[_pi]);
  };
  img.src=_history[_history.length-1];
}
function cvClear(){
  if(!confirm('Limpar esta página?')||!_ctx||!_cvs)return;
  _history=[];
  _ctx.fillStyle='#FFFFFF';_ctx.fillRect(0,0,_cvs.width,_cvs.height);
  _ctx.strokeStyle='#F0EAE2';_ctx.lineWidth=0.5;
  for(let x=40;x<_cvs.width;x+=40){_ctx.beginPath();_ctx.moveTo(x,0);_ctx.lineTo(x,_cvs.height);_ctx.stroke();}
  for(let y=40;y<_cvs.height;y+=40){_ctx.beginPath();_ctx.moveTo(0,y);_ctx.lineTo(_cvs.width,y);_ctx.stroke();}
  const s=sem(),pages=s.pages||[];if(_pi<pages.length)cvAutoSave(s,pages[_pi]);
}
function cvExport(){
  if(!_cvs)return;
  const a=document.createElement('a');
  a.download=(sem().pages?.[_pi]?.name||'pagina')+'.png';
  a.href=_cvs.toDataURL('image/png');a.click();
}
function pgSwitch(i){
  if(_dirty&&_cvs){const s=sem(),pages=s.pages||[];if(_pi<pages.length)cvAutoSave(s,pages[_pi]);}
  _pi=i;_history=[];rMain();
}
function pgAdd(){
  const n=prompt('Nome da página:','Página '+((sem().pages?.length||0)+1));
  if(!n?.trim())return;
  const p={id:uid(),name:n.trim()};
  updSem(s=>({...s,pages:[...(s.pages||[]),p]}));
  _pi=(sem().pages?.length||1)-1;rMain();
}
function pgDel(){
  const s=sem(),pages=s.pages||[];
  if(pages.length<=1){alert('Precisa ter ao menos uma página.');return;}
  if(!confirm('Deletar "'+pages[_pi].name+'"?'))return;
  try{localStorage.removeItem(pk(s.id,pages[_pi].id));}catch{}
  updSem(s=>({...s,pages:s.pages.filter((_,i)=>i!==_pi)}));
  if(_pi>=(sem().pages?.length||1))_pi=0;
  rMain();
}

// ═══════════════════════════════════════════════════════════════════════════════
// EXPORT / IMPORT — backup sem perder dados entre atualizações
// ═══════════════════════════════════════════════════════════════════════════════
function exportData(){
  const mainData=localStorage.getItem(SK)||'{}';
  const pageData={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith(PK)){pageData[k]=localStorage.getItem(k);}
  }
  const blob=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),mainData,pageData},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='academico_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=ev=>{
    const file=ev.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data.mainData){alert('Arquivo inválido ou corrompido.');return;}
        if(!confirm('Isso vai substituir todos os dados atuais pelo backup. Continuar?'))return;
        localStorage.setItem(SK,data.mainData);
        if(data.pageData){Object.entries(data.pageData).forEach(([k,v])=>localStorage.setItem(k,v));}
        const st=lsLoad();
        if(st){A.sems=st.sems;A.activeId=st.activeId;}
        render();
        alert('✓ Dados importados com sucesso!');
      }catch(err){alert('Erro ao importar: '+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

// ── init ──────────────────────────────────────────────────────────────────────
render();
</script>
