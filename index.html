<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isis</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* Vinho — cor principal Isis */
  --p9:#2A0810;--p8:#4A1020;--p7:#6B1A2E;--p6:#8B1E38;--p5:#A63050;--p4:#C4728A;--p3:#DBA8B5;--p2:#EDD0D8;--p1:#F7EAED;--p0:#FDF5F7;
  /* Rosé / Mauve — tons secundários */
  --r4:#C9969F;--r3:#DDB8BE;--r2:#EDD5D9;--r1:#F6ECEE;--r0:#FDF8F9;
  /* Neutros quentes creme */
  --n9:#1C1614;--n8:#2E2420;--n7:#42322D;--n6:#6B524C;--n5:#9C8078;--n4:#BFA8A2;--n3:#D8CECC;--n2:#EAE4E2;--n1:#F3EFED;--n0:#FAF8F7;
  /* Sistema */
  --bg:#F4EFEB;--sur:#FFFCFB;--bd:#E0D6D2;--bdl:#EDE7E4;
  --t1:#1C1614;--t2:#6B524C;--t3:#A89090;
  --ok:#2D5A3D;--okb:#D4EAD9;--er:#8B1E38;--erb:#F7EAED;--wa:#7A4A00;--wab:#FEF0D8;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;font-size:13px;background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;letter-spacing:.01em}
button,input,select,textarea{font-family:'Outfit',sans-serif}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--n3);border-radius:4px}
#app{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:54px;background:var(--sur);border-bottom:1px solid var(--bdl);flex-shrink:0;box-shadow:0 1px 0 var(--bdl)}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:190px;background:var(--r0);border-right:1px solid var(--bdl);padding:12px 8px 24px;display:flex;flex-direction:column;gap:1px;flex-shrink:0;overflow-y:auto}
.main{flex:1;overflow-y:auto;padding:24px 26px;background:var(--bg)}
/* Logo */
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:30px;height:30px;flex-shrink:0}
.logo-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:500;color:var(--n8);letter-spacing:.04em}

/* Nav */
.nsec{font-size:8.5px;font-weight:600;color:var(--r4);letter-spacing:.16em;text-transform:uppercase;padding:14px 11px 5px}
.nbtn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 11px;border-radius:6px;border:none;background:none;color:var(--t2);font-size:12px;font-weight:400;cursor:pointer;text-align:left;transition:all .15s;letter-spacing:.02em}
.nbtn:hover{background:var(--n1);color:var(--n8)}
.nbtn.active{background:var(--r1);color:var(--p6);font-weight:500;border-left:2px solid var(--p6)}
.nicon{width:16px;text-align:center;font-size:12px;flex-shrink:0}
/* Sem selector */
.swrap{margin-left:auto;position:relative;display:flex;gap:5px;align-items:center}
.spill{display:flex;align-items:center;gap:6px;background:var(--n1);border:1px solid var(--n3);border-radius:4px;padding:5px 12px 5px 10px;color:var(--n7);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;letter-spacing:.03em}
.spill:hover{background:var(--r1);border-color:var(--r3);color:var(--p6)}
.scfg{background:none;border:none;color:var(--t3);font-size:14px;padding:4px 7px;border-radius:4px;cursor:pointer;transition:all .15s}
.scfg:hover{background:var(--n1);color:var(--n7)}
.sdd{position:absolute;right:0;top:calc(100% + 6px);background:var(--sur);border:1px solid var(--bd);border-radius:8px;z-index:60;min-width:210px;overflow:hidden;box-shadow:0 8px 32px rgba(26,23,20,.10)}
.sitem{display:block;width:100%;padding:9px 14px;background:none;border:none;color:var(--t2);text-align:left;font-size:12px;cursor:pointer;transition:background .12s;letter-spacing:.02em}
.sitem:hover,.sitem.on{background:var(--p0);color:var(--p6)}
.sitem.on{font-weight:500}
/* Cards */
.card{background:var(--sur);border:1px solid var(--bdl);border-radius:8px;padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 3px rgba(26,23,20,.04)}
.stitle{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;margin-bottom:14px;color:var(--n8);letter-spacing:.02em}
/* Inputs */
.inp{background:var(--n0);border:1px solid var(--n3);border-radius:5px;padding:7px 11px;color:var(--t1);width:100%;font-size:12.5px;outline:none;transition:border-color .15s;font-family:'Outfit',sans-serif;letter-spacing:.02em}
.inp:focus{border-color:var(--p4);background:#fff;box-shadow:0 0 0 3px var(--r1)}
.lbl{font-size:9.5px;color:var(--t3);margin-bottom:3px;display:block;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.fld{margin-bottom:10px}
.row{display:flex;gap:8px}
.fh{flex:1;margin-bottom:10px}
textarea.inp{resize:vertical;min-height:68px;line-height:1.6}
/* Buttons */
.btn{border-radius:4px;padding:7px 14px;font-weight:500;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;border:none;transition:all .15s;letter-spacing:.04em;font-family:'Outfit',sans-serif}
.btn-p{background:var(--p6);color:#fff;box-shadow:0 2px 8px rgba(90,45,158,.25)}
.btn-p:hover{background:var(--p7);box-shadow:0 3px 12px rgba(90,45,158,.35)}
.btn-o{background:var(--sur);color:var(--t1);border:1px solid var(--n3)}
.btn-o:hover{background:var(--n1);border-color:var(--n4)}
.btn-g{background:none;color:var(--t3);border:none}
.btn-g:hover{color:var(--t2)}
.btn-sm{padding:3px 10px;font-size:11px;border-radius:3px}
.btn-d{background:var(--erb);color:var(--er);border:1px solid #f0c0c0}
/* Stats */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--sur);border-radius:6px;padding:12px 14px;border:1px solid var(--bdl);box-shadow:0 1px 3px rgba(26,23,20,.04)}
.slbl{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.sval{font-family:'Playfair Display',serif;font-size:26px;font-weight:500;color:var(--p6);line-height:1}
/* Alerts */
.abox{background:var(--wab);border:1px solid #EFC76A;border-left:3px solid var(--wa);border-radius:4px;padding:9px 13px;margin-bottom:12px;font-size:12px;color:var(--wa);letter-spacing:.02em}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(26,23,20,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(4px)}
.modal{background:var(--sur);border-radius:10px;width:100%;max-width:465px;max-height:90vh;overflow-y:auto;padding:24px;border:1px solid var(--bdl);box-shadow:0 20px 60px rgba(26,23,20,.15)}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bdl)}
.mtitle{font-family:'Playfair Display',serif;font-size:18px;font-weight:500;color:var(--n8);letter-spacing:.02em}
/* Misc */
.cdot{width:22px;height:22px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:transform .12s}
.cdot:hover{transform:scale(1.18)}
.abar{flex:1;max-width:80px;height:4px;background:var(--n2);border-radius:2px;overflow:hidden}
.afill{height:100%;border-radius:2px;transition:width .4s}
.dchip{padding:3px 9px;border-radius:3px;font-size:11px;cursor:pointer;border:1px solid;transition:all .12s;letter-spacing:.02em}
.atvc{display:flex;align-items:flex-start;gap:10px;background:var(--sur);border:1px solid var(--bdl);border-radius:6px;padding:11px 13px;margin-bottom:6px;box-shadow:0 1px 2px rgba(26,23,20,.03)}
.atvc input[type=checkbox]{margin-top:3px;width:14px;height:14px;accent-color:var(--p5);cursor:pointer;flex-shrink:0}
.anotes{font-size:11px;color:var(--t3);margin-top:4px;background:var(--n0);border-radius:4px;padding:6px 9px;white-space:pre-wrap;line-height:1.6;border:1px solid var(--bdl)}
.gwrap{background:var(--n0);border-radius:6px;padding:11px 13px;min-width:110px;border:1px solid var(--bdl)}
.wktbl{width:100%;border-collapse:collapse;font-size:11.5px}
.wktbl th,.wktbl td{padding:5px 6px;border-bottom:1px solid var(--bdl)}
.wktbl th{font-weight:600;color:var(--t3);text-align:center;font-size:10px;letter-spacing:.07em;text-transform:uppercase}
.wktbl th:first-child{text-align:left;width:70px}
.scell{border-radius:0 3px 3px 0;padding:4px 8px;border-left:2px solid}
.pill{display:inline-block;padding:2px 9px;border-radius:2px;font-size:10px;font-weight:500;letter-spacing:.04em}
.empty{border:1px dashed var(--n3);border-radius:6px;padding:28px;text-align:center;color:var(--t3);font-size:13px;letter-spacing:.02em}
/* Doc editor */
.tbtn{background:none;border:1px solid transparent;border-radius:3px;padding:3px 8px;font-size:12px;color:var(--t2);cursor:pointer;transition:all .12s;min-width:26px;line-height:1.5;font-family:'Outfit',sans-serif}
.tbtn:hover{background:var(--p0);border-color:var(--p2);color:var(--p6)}
#doc-ce h1{font-size:24px;font-weight:400;color:var(--n8);margin:16px 0 8px;font-family:'Playfair Display',serif;letter-spacing:.02em}
#doc-ce h2{font-size:17px;font-weight:500;color:var(--p7);margin:13px 0 5px;font-family:'Playfair Display',serif}
#doc-ce h3{font-size:14px;font-weight:500;color:var(--n6);margin:11px 0 4px}
#doc-ce p{margin:0 0 8px;line-height:1.85}
#doc-ce ul,#doc-ce ol{margin:5px 0 10px 20px;line-height:1.85}
#doc-ce blockquote{border-left:2px solid var(--p4);padding:6px 14px;margin:10px 0;color:var(--t2);background:var(--p0);border-radius:0 4px 4px 0;font-style:italic}
#doc-ce strong{color:var(--p7)}
#doc-ce:focus{outline:none}
#doc-ce:empty:before{content:attr(data-ph);color:var(--t3);pointer-events:none}

/* ═══ ANIMATIONS ═══════════════════════════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideRight{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:.04}50%{opacity:.07}}
@keyframes barGrow{from{width:0}to{width:var(--bar-w,100%)}}

/* Page enter */
.main{animation:fadeIn .25s ease}

/* Sidebar nav items stagger */
.nbtn{animation:slideRight .2s ease both}
.nbtn:nth-child(1){animation-delay:.03s}
.nbtn:nth-child(2){animation-delay:.06s}
.nbtn:nth-child(3){animation-delay:.09s}
.nbtn:nth-child(4){animation-delay:.12s}
.nbtn:nth-child(5){animation-delay:.15s}
.nbtn:nth-child(6){animation-delay:.18s}
.nbtn:nth-child(7){animation-delay:.21s}
.nbtn:nth-child(8){animation-delay:.24s}

/* Cards */
.card{transition:box-shadow .2s ease, transform .2s ease, border-color .2s ease}
.card:hover{box-shadow:0 6px 24px rgba(139,30,56,.10);transform:translateY(-2px);border-color:var(--r3)}

/* Hero text decoration pulse */
.hero-bg-text{animation:pulse 4s ease-in-out infinite}

/* Stat blocks */
.hero-stat{transition:transform .18s ease, opacity .18s ease}
.hero-stat:hover{transform:translateY(-3px)}

/* Nav active indicator */
.nbtn.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:60%;background:var(--p6);border-radius:0 2px 2px 0;transition:height .2s ease}
.nbtn{position:relative}

/* Buttons */
.btn-p{transition:all .18s ease}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(139,30,56,.30)}
.btn-p:active{transform:translateY(0)}
.btn-o{transition:all .18s ease}
.btn-o:hover{transform:translateY(-1px)}

/* Section fade-up on render */
.s-enter{animation:fadeUp .3s ease both}
.s-enter:nth-child(1){animation-delay:.05s}
.s-enter:nth-child(2){animation-delay:.10s}
.s-enter:nth-child(3){animation-delay:.15s}
.s-enter:nth-child(4){animation-delay:.20s}
.s-enter:nth-child(5){animation-delay:.25s}

/* Flash cards hover */
.flash{transition:all .18s ease}
.flash:hover{border-left-width:4px;box-shadow:0 3px 12px rgba(139,30,56,.08)}

/* Table rows */
.wktbl tbody tr{transition:background .15s ease}
.wktbl tbody tr:hover td{background:var(--p0)}

/* Input focus glow */
.inp{transition:border-color .18s ease, box-shadow .18s ease, background .18s ease}

/* Modal enter */
.modal{animation:fadeUp .22s ease}

/* Pill hover */
.pill{transition:all .15s ease}

/* Stat counter shimmer on hover */
.hero-stat-num{transition:color .2s ease}
.hero-stat:hover .hero-stat-num{color:var(--r2)}

/* Topbar subtle shadow on scroll */
.topbar{transition:box-shadow .2s ease}

/* Scrollbar refined */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--r3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--p4)}

/* Responsive */
@media(max-width:640px){
  .sidebar{width:52px;overflow:hidden}
  .sidebar .nsec,.sidebar .logo-name,.nbtn span{display:none}
  .nbtn{justify-content:center;padding:10px}
  .nicon{width:auto;font-size:16px}
  .main{padding:16px 14px}
}

/* ═══ DRAG AND DROP ══════════════════════════════════════════════════════════ */
.doc-card[draggable="true"]{cursor:grab}
.doc-card[draggable="true"]:active{cursor:grabbing}
.doc-card.dragging{opacity:.4;transform:scale(.97)!important;box-shadow:none!important}
.drop-zone{min-height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.drop-zone.drag-over{border-color:var(--p5)!important;background:var(--p0)!important;transform:scale(1.04)!important;box-shadow:0 4px 16px rgba(139,30,56,.15)}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="logo">
      <svg class="logo-mark" viewBox="0 0 30 30" fill="none">
        <rect x="2" y="2" width="26" height="26" rx="7" fill="#F7EAED"/>
        <rect x="2" y="2" width="26" height="26" rx="7" stroke="#DBA8B5" stroke-width="1"/>
        <path d="M15 7 C10 7 7 10 7 14 C7 18 10 21 14 22 C14.5 22.1 15 23 15 23 C15 23 15.5 22.1 16 22 C20 21 23 18 23 14 C23 10 20 7 15 7Z" fill="#A63050" opacity=".15"/>
        <path d="M15 9 C11.5 9 9 11.5 9 15 C9 18.5 11.5 21 15 21 C18.5 21 21 18.5 21 15 C21 11.5 18.5 9 15 9Z" stroke="#8B1E38" stroke-width="1.2" fill="none"/>
        <path d="M12 12.5 L15 19.5 L18 12.5" stroke="#8B1E38" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M12.8 16.5 L17.2 16.5" stroke="#C4728A" stroke-width="1" stroke-linecap="round"/>
      </svg>
      <span class="logo-name">Isis</span>
    </div>
    <!-- Export / Import -->
    <div style="display:flex;gap:4px;align-items:center;margin-left:10px">
      <button onclick="exportData()" title="Exportar backup dos seus dados" style="display:flex;align-items:center;gap:4px;background:none;border:1px solid var(--n3);border-radius:4px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--n5);cursor:pointer;font-family:'Outfit',sans-serif;letter-spacing:.03em;transition:all .15s" onmouseover="this.style.background='var(--n1)';this.style.color='var(--n7)'" onmouseout="this.style.background='none';this.style.color='var(--n5)'">↓ Exportar</button>
      <button onclick="importData()" title="Importar backup salvo anteriormente" style="display:flex;align-items:center;gap:4px;background:none;border:1px solid transparent;border-radius:4px;padding:4px 10px;font-size:11px;font-weight:500;color:var(--n5);cursor:pointer;font-family:'Outfit',sans-serif;letter-spacing:.03em;transition:all .15s" onmouseover="this.style.background='var(--n1)';this.style.color='var(--n7)'" onmouseout="this.style.background='none';this.style.color='var(--n5)'">↑ Importar</button>
    </div>
    <div class="swrap" id="swrap">
      <button class="scfg" onclick="openSemCfg()" title="Configurar">⚙</button>
      <button class="spill" onclick="toggleDD()">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.3"/><path d="M6 3.5v2.7l1.7.9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="slbl">...</span>
        <span style="font-size:9px;opacity:.55">▾</span>
      </button>
      <div class="sdd" id="sdd" style="display:none"></div>
    </div>
  </div>
  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main" id="main"></main>
  </div>
</div>
<div class="overlay" id="ov" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="mb"></div>
</div>

<script>
// ── constants ─────────────────────────────────────────────────────────────────
const SCOLS=['#8B1E38','#A63050','#C4728A','#6B3A2A','#9A4A1E','#2D5A3D','#1A4A6B','#5A3A6B'];
const DAYS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const TODAY=new Date().toISOString().slice(0,10);
const uid=()=>Math.random().toString(36).slice(2,9);
const fmt=d=>d?d.slice(8,10)+'/'+d.slice(5,7):'';
const fmtF=d=>d?d.slice(8,10)+'/'+d.slice(5,7)+'/'+d.slice(0,4):'';
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── state ─────────────────────────────────────────────────────────────────────
const SK='acad_v11';
function lsLoad(){try{return JSON.parse(localStorage.getItem(SK));}catch{return null;}}
function lsSave(){try{localStorage.setItem(SK,JSON.stringify({sems:A.sems,activeId:A.activeId}));}catch{}}
const mkSem=n=>({id:uid(),name:n||'1º Semestre 2026',startDate:'2026-02-01',endDate:'2026-06-30',passingGrade:6,subjects:[],assignments:[],exams:[],holidays:[],attendance:{},gradeConfigs:{},gradeValues:{},docs:[],pages:[],cancellations:{}});
const stored=lsLoad();
const A={sems:stored?.sems||[mkSem()],activeId:stored?.activeId||null,tab:'dashboard'};
function sem(){return(A.activeId&&A.sems.find(s=>s.id===A.activeId))||A.sems[0];}
function updSem(fn){const s=sem(),id=s.id;A.sems=A.sems.map(x=>x.id===id?fn({...x}):x);lsSave();render();}
function render(){rSidebar();rMain();document.getElementById('slbl').textContent=sem()?.name||'';document.getElementById('sdd').style.display='none';}

// ── math ──────────────────────────────────────────────────────────────────────
function dBetween(s,e,dow){if(!s||!e)return[];const r=[],c=new Date(s+'T12:00'),ee=new Date(e+'T12:00');while(c.getDay()!==dow)c.setDate(c.getDate()+1);while(c<=ee){r.push(c.toISOString().slice(0,10));c.setDate(c.getDate()+7);}return r;}
function subDates(sub,sm){const seen=new Set(),all=[];for(const sl of(sub.schedule||[])){for(const d of dBetween(sm.startDate,sm.endDate,sl.day)){if(!seen.has(d)&&!(sm.holidays||[]).includes(d)){seen.add(d);all.push(d);}}}return all.sort();}
function absStats(sub,sm){const dates=subDates(sub,sm),att=(sm.attendance||{})[sub.id]||{};const total=dates.length,max=Math.floor(total*.25),used=dates.filter(d=>att[d]).length;return{total,max,used,rem:max-used,dates};}
function absStatsV2(sub,sm){
  const allScheduled=subDates(sub,sm);
  const subCancels=(sm.cancellations||{})[sub.id]||[];
  const realDates=allScheduled.filter(d=>!subCancels.includes(d));
  const realTotal=realDates.length;
  const max=Math.floor(realTotal*.25);
  const att=(sm.attendance||{})[sub.id]||{};
  const used=realDates.filter(d=>att[d]).length;
  const holidayCount=allScheduled.filter(d=>(sm.holidays||[]).includes(d)).length;
  const cancelCount=subCancels.filter(d=>allScheduled.includes(d)||d>=(sm.startDate||'')).length;
  const allDates=[...new Set([...allScheduled,...subCancels.filter(d=>d>=(sm.startDate||''))])].sort();
  return{realTotal,max,used,rem:max-used,allDates,holidayCount,cancelCount};
}

function gAvg(cfgs,vals){if(!cfgs?.length)return null;let n=0,d=0;for(const c of cfgs){const v=vals?.[c.id];if(v!==''&&v!=null&&!isNaN(+v)){n+=+v*c.weight;d+=c.weight;}}return d>0?+(n/d).toFixed(2):null;}
function gNeeded(cfgs,vals,pass){if(!cfgs?.length)return null;let earn=0,tot=0,miss=0;for(const c of cfgs){tot+=c.weight;const v=vals?.[c.id];if(v!==''&&v!=null&&!isNaN(+v))earn+=+v*c.weight;else miss+=c.weight;}return miss?+Math.max(0,(pass*tot-earn)/miss).toFixed(2):null;}

function animateCounters(){
  document.querySelectorAll('.hero-stat-num').forEach(el=>{
    const target=parseInt(el.textContent)||0;
    if(target===0)return;
    let current=0;
    const step=Math.ceil(target/12);
    const timer=setInterval(()=>{
      current=Math.min(current+step,target);
      el.textContent=current;
      if(current>=target)clearInterval(timer);
    },40);
  });
}

function rHorario(){
  const s=sem();const days=[1,2,3,4,5];
  if((s.subjects||[]).some(x=>x.schedule?.some(sl=>sl.day===6)))days.push(6);
  const slotSet=new Set();(s.subjects||[]).forEach(sub=>(sub.schedule||[]).forEach(sl=>slotSet.add(sl.startTime+'|'+sl.endTime)));
  const slots=[...slotSet].sort().map(x=>{const[st,et]=x.split('|');return{st,et};});
  if(!s.subjects?.length||!slots.length)return`<div style="position:relative;margin:-24px -26px 24px;padding:32px 40px 28px;background:linear-gradient(135deg,var(--p8) 0%,var(--p6) 60%,var(--p5) 100%);overflow:hidden"><div style="position:absolute;bottom:-20px;right:-10px;font-family:'Playfair Display',serif;font-size:100px;font-weight:700;color:#fff;opacity:.04;line-height:1;pointer-events:none;user-select:none;letter-spacing:-.02em">horário</div><div style="position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;border:1px solid #fff;opacity:.07;pointer-events:none"></div><div style="position:relative;z-index:2;animation:fadeUp .3s ease both"><div style="font-family:'Outfit',sans-serif;font-size:9px;font-weight:400;color:var(--r2);letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px;opacity:.7">Grade semanal</div><div style="font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:#fff;line-height:1.1">Horário</div></div></div><div class="empty">Cadastre matérias com horários para ver a grade aqui.</div>`;
  const tdow=new Date().getDay();
  const gCell=(day,st,et)=>(s.subjects||[]).find(sub=>sub.schedule?.some(sl=>sl.day===day&&sl.startTime===st&&sl.endTime===et));
  return`<h2 class="stitle" style="display:none">Grade de horários — ${esc(s.name)}</h2>
  <div class="card" style="overflow-x:auto;padding:15px 17px">
    <table class="wktbl">
      <thead><tr>
        <th style="text-align:left;color:var(--t3)">Horário</th>
        ${days.map(d=>`<th style="color:${d===tdow?'var(--p6)':'var(--t3)'};${d===tdow?'background:var(--p0);border-radius:5px 5px 0 0':''}">${DAYS[d]}${d===tdow?' ★':''}</th>`).join('')}
      </tr></thead>
      <tbody>${slots.map(({st,et})=>`<tr>
        <td style="font-size:10px;color:var(--t3);white-space:nowrap;line-height:1.35;padding:5px 6px">${st}<br>${et}</td>
        ${days.map(d=>{const sub=gCell(d,st,et);const sl=sub?.schedule?.find(x=>x.day===d&&x.startTime===st);return`<td style="padding:4px;${d===tdow?'background:var(--p0)':''}">
          ${sub?`<div class="scell" style="background:${sub.color}14;border-left-color:${sub.color}"><div style="font-size:11px;font-weight:700;color:${sub.color}">${esc(sub.name)}</div>${sl?.room?`<div style="font-size:9.5px;color:var(--t3)">${esc(sl.room)}</div>`:''}</div>`:''}</td>`;}).join('')}
      </tr>`).join('')}</tbody>
    </table>
  </div>`;
}

function rFaltasDetail(s, subId){
  const subjects=s.subjects||[];
  const sub=subjects.find(x=>x.id===subId);
  if(!sub) return rFaltasList(s);
  const st=absStatsV2(sub,s);
  const att=(s.attendance||{})[sub.id]||{};
  const subCancels=(s.cancellations||{})[sub.id]||[];
  const pct=st.realTotal>0?Math.round((st.used/st.realTotal)*100):0;
  const danger=st.rem<=1,warn=st.rem<=2&&st.rem>1;
  const barColor=danger?'var(--er)':warn?'#E09000':'var(--ok)';
  const monthNames=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const monthNamesShort=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  // Group dates by month
  const byMonth={};
  st.allDates.forEach(d=>{
    const key=d.slice(0,7);
    if(!byMonth[key]) byMonth[key]=[];
    byMonth[key].push(d);
  });

  return`
  <div style="position:relative;margin:-24px -26px 24px;padding:32px 40px 28px;background:linear-gradient(135deg,var(--p8) 0%,var(--p6) 60%,var(--p5) 100%);overflow:hidden">

function toggleAbs(subId, date, blocked, el){
  if(blocked) return;
  const s=sem();
  const att=JSON.parse(JSON.stringify(s.attendance||{}));
  if(!att[subId]) att[subId]={};
  const wasAbs=!!att[subId][date];
  if(wasAbs) delete att[subId][date];
  else att[subId][date]=true;
  updSem(s=>({...s,attendance:att}));

  // Update only the clicked day cell — no full re-render
  const isPast=date<=TODAY;
  const isToday=date===TODAY;
  const isNowAbs=!wasAbs;
  let bg,color,border='transparent';
  if(isNowAbs&&isPast){bg='var(--erb)';color='var(--er)';border='var(--er)';}
  else if(!isNowAbs&&isPast&&!isToday){bg='var(--okb)';color='var(--ok)';}
  else if(isToday){bg='var(--p6)';color='#fff';}
  else{bg='var(--n1)';color='var(--t3)';}
  if(el){
    el.style.background=bg;
    el.style.color=color;
    el.style.borderColor=border;
    el.style.transform='scale(1.2)';
    setTimeout(()=>el.style.transform='',180);
  }

  // Update only the stats badge and progress bar for this subject
  const newAtt=att[subId]||{};
  const subCard=el?.closest('.abs-card');
  if(!subCard) return;

  const newS=sem();
  const sub=(newS.subjects||[]).find(x=>x.id===subId);
  if(!sub) return;
  const st=absStatsV2(sub,newS);
  const pct=st.realTotal>0?Math.round((st.used/st.realTotal)*100):0;
  const danger=st.rem<=1, warn=st.rem<=2&&st.rem>1;

  // Update badge
  const badge=subCard.querySelector('.abs-badge');
  if(badge){
    badge.textContent=st.used+' falta'+(st.used!==1?'s':'')+' · '+st.rem+' restante'+(st.rem!==1?'s':'')+' de '+st.max+' permitida'+(st.max!==1?'s':'');
    badge.style.color=danger?'var(--er)':warn?'var(--wa)':'var(--ok)';
    badge.style.background=danger?'var(--erb)':warn?'var(--wab)':'var(--okb)';
  }

  // Update progress bar
  const bar=subCard.querySelector('.abs-bar');
  if(bar){
    bar.style.width=Math.min(100,pct)+'%';
    bar.style.background=danger?'var(--er)':warn?'#E09000':'var(--ok)';
  }

  // Update card border
  if(danger) subCard.style.borderLeft='3px solid var(--er)';
  else subCard.style.borderLeft='';
}

function rFolderView(s,docs,htmlDocs){
  const subjects=s.subjects||[];
  const folderId=_folderOpen;
  const isGeral=folderId==='geral';
  const subject=subjects.find(x=>x.id===folderId);
  const folderName=isGeral?'Geral':(subject?.name||'Pasta');
  const folderColor=isGeral?'var(--n4)':(subject?.color||'var(--p4)');

  const folderDocs=docs.filter(d=>isGeral
    ?(!d.subjectId||!subjects.find(x=>x.id===d.subjectId))
    :d.subjectId===folderId
  );
  const folderHtml=htmlDocs.filter(d=>isGeral
    ?(!d.subjectId||!subjects.find(x=>x.id===d.subjectId))
    :d.subjectId===folderId
  );
  const allEmpty=!folderDocs.length&&!folderHtml.length;

function handleDocDrop(e,targetFolderId){
  e.preventDefault();
  const docId=e.dataTransfer.getData('docId');
  const docType=e.dataTransfer.getData('docType');
  if(!docId)return;
  confirmMove(docId,docType,targetFolderId);
}

function initFolderDnd(){
  document.querySelectorAll('.doc-card').forEach(card=>{
    card.addEventListener('dragstart',e=>{
      e.dataTransfer.setData('docId',card.dataset.id);
      e.dataTransfer.setData('docType',card.dataset.type);
      card.style.opacity='.4';
      card.style.transform='scale(.97)';
      card.style.cursor='grabbing';
    });
    card.addEventListener('dragend',()=>{
      card.style.opacity='';
      card.style.transform='';
      card.style.cursor='grab';
      document.querySelectorAll('.drop-zone').forEach(z=>{
        z.style.borderColor='var(--n3)';
        z.style.background='var(--sur)';
        z.style.transform='';
      });
    });
  });
}

function docFmt(cmd,val){document.getElementById('doc-ce')?.focus();document.execCommand(cmd,false,val||null);schedDoc();}
function importFromClaude(folderId){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json,.acad';
  inp.onchange=ev=>{
    const file=ev.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(data.type!=='academico_resumo')return alert('Arquivo inválido. Use um arquivo exportado pelo Claude.');
        const s=sem();
        const subjectId=folderId&&folderId!=='geral'?folderId:(s.subjects||[]).find(x=>x.name===data.subject)?.id||'';
        const doc={id:uid(),title:data.title||'Resumo',content:data.content||'',subjectId,fromClaude:true,updatedAt:new Date().toISOString()};
        updSem(s=>({...s,docs:[...(s.docs||[]),doc]}));
        _docId=doc.id;rMain();
      }catch{alert('Erro ao ler o arquivo.');}
    };
    reader.readAsText(file);
  };
  inp.click();
}

function newDoc(folderId){
  const subjectId=folderId&&folderId!=='geral'?folderId:'';
  const doc={id:uid(),title:'',content:'',subjectId,updatedAt:new Date().toISOString()};
  updSem(s=>({...s,docs:[...(s.docs||[]),doc]}));_docId=doc.id;rMain();
}
function moveDoc(docId, type){
  const s=sem();
  const subjects=s.subjects||[];
  const opts=[{id:'geral',name:'Geral'},...subjects.map(x=>({id:x.id,name:x.name}))];
  const current=type==='html'
    ?(s.htmlDocs||[]).find(d=>d.id===docId)
    :(s.docs||[]).find(d=>d.id===docId);
  const currentFolder=current?.subjectId||'geral';

  // Build modal entirely with DOM (no template literals)
  const overlay=document.createElement('div');
  overlay.className='overlay';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove();};

  const modal=document.createElement('div');
  modal.className='modal';
  modal.style.maxWidth='340px';
  modal.onclick=e=>e.stopPropagation();

  const head=document.createElement('div');
  head.className='mhead';
  head.innerHTML='<span class="mtitle">Mover documento</span>';
  const closeBtn=document.createElement('button');
  closeBtn.innerHTML='&times;';
  closeBtn.style.cssText='background:none;border:none;font-size:22px;cursor:pointer;color:var(--t3);line-height:1';
  closeBtn.onclick=()=>overlay.remove();
  head.appendChild(closeBtn);

  const sub=document.createElement('div');
  sub.style.cssText='font-size:12px;color:var(--t2);margin-bottom:12px';
  sub.textContent='Escolha a pasta de destino:';

  const list=document.createElement('div');
  opts.forEach(o=>{
    const isCurrent=o.id===currentFolder;
    const btn=document.createElement('button');
    btn.style.cssText='display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:6px;border:1px solid '+(isCurrent?'var(--p4)':'var(--bdl)')+';background:'+(isCurrent?'var(--p0)':'var(--sur)')+';cursor:pointer;font-family:Outfit,sans-serif;font-size:13px;color:var(--t1);text-align:left;width:100%;margin-bottom:5px;transition:all .15s';
    btn.onmouseover=()=>{btn.style.background='var(--p0)';btn.style.borderColor='var(--p3)';};
    btn.onmouseout=()=>{btn.style.background=isCurrent?'var(--p0)':'var(--sur)';btn.style.borderColor=isCurrent?'var(--p4)':'var(--bdl)';};
    btn.onclick=()=>{confirmMove(docId,type,o.id);overlay.remove();};

    const icon=document.createElement('span');
    icon.style.fontSize='18px';
    icon.textContent='📁';

    const label=document.createElement('span');
    label.style.fontWeight=isCurrent?'600':'400';
    label.textContent=o.name;

    btn.appendChild(icon);
    btn.appendChild(label);

    if(isCurrent){
      const badge=document.createElement('span');
      badge.style.cssText='margin-left:auto;font-size:10px;color:var(--p5);font-weight:600;background:var(--p1);padding:2px 6px;border-radius:3px';
      badge.textContent='atual';
      btn.appendChild(badge);
    }
    list.appendChild(btn);
  });

  modal.appendChild(head);
  modal.appendChild(sub);
  modal.appendChild(list);
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
}

function confirmMove(docId,type,targetFolder){
  const subjectId=targetFolder==='geral'?'':targetFolder;
  if(type==='html'){
    updSem(s=>({...s,htmlDocs:(s.htmlDocs||[]).map(d=>d.id===docId?{...d,subjectId}:d)}));
  } else {
    updSem(s=>({...s,docs:(s.docs||[]).map(d=>d.id===docId?{...d,subjectId}:d)}));
  }
  document.querySelector('.overlay')?.remove();
  rMain();
}
function delDoc(id){if(!confirm('Deletar este resumo?'))return;if(_docId===id)_docId=null;updSem(s=>({...s,docs:(s.docs||[]).filter(d=>d.id!==id)}));}
function schedDoc(){
  const el=document.getElementById('doc-sv');if(el){el.textContent='salvando...';el.style.color='var(--t3)';}
  clearTimeout(_docTimer);_docTimer=setTimeout(saveDoc,700);
}
function saveDoc(){
  if(!_docId)return;
  const title=document.getElementById('doc-ti')?.value||'';
  const content=document.getElementById('doc-ce')?.innerHTML||'';
  const subjectId=document.getElementById('doc-su')?.value||'';
  const s=sem();if(!(s.docs||[]).find(d=>d.id===_docId))return;
  A.sems=A.sems.map(x=>x.id===s.id?{...x,docs:(x.docs||[]).map(d=>d.id===_docId?{...d,title,content,subjectId,updatedAt:new Date().toISOString()}:d)}:x);
  lsSave();
  const el=document.getElementById('doc-sv');if(el){el.textContent='✓ salvo';el.style.color='var(--ok)';}
}

function rHtmlViewer(s,htmlDocs){
  const doc=htmlDocs.find(d=>d.id===_htmlDocId);
  if(!doc){_htmlDocId=null;return rResumos();}
  setTimeout(()=>{
    const fr=document.getElementById('html-frame');
    if(fr){const blob=new Blob([doc.htmlContent],{type:'text/html'});fr.src=URL.createObjectURL(blob);}
  },30);
  return`<div style="display:flex;align-items:center;gap:9px;margin-bottom:10px;flex-wrap:wrap">
    <button class="btn btn-o btn-sm" onclick="_htmlDocId=null;rMain()">← Voltar</button>
    <span style="font-size:15px;font-weight:700;color:var(--p8);flex:1">${esc(doc.title||'Resumo')}</span>
    <span style="font-size:11px;color:var(--ok)">✦ Página interativa</span>
  </div>
  <iframe id="html-frame" style="width:100%;height:calc(100vh - 130px);border:1px solid var(--bdl);border-radius:10px;background:#fff" sandbox="allow-scripts allow-same-origin"></iframe>`;
}
function importHtmlDoc(folderId){
  const inp=document.createElement('input');inp.type='file';inp.accept='.html,.htm';
  inp.onchange=ev=>{
    const file=ev.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      const htmlContent=e.target.result;
      const titleMatch=htmlContent.match(/<title[^>]*>([^<]+)<\/title>/i);
      const h1Match=htmlContent.match(/<h1[^>]*>([^<]+)<\/h1>/i);
      const title=(titleMatch?.[1]||h1Match?.[1]||file.name.replace('.html','')).trim();
      const s=sem();
      const subjectId=folderId&&folderId!=='geral'?folderId:'';
      const doc={id:uid(),title,htmlContent,subjectId,updatedAt:new Date().toISOString()};
      updSem(s=>({...s,htmlDocs:[...(s.htmlDocs||[]),doc]}));
      _htmlDocId=doc.id;rMain();
    };
    reader.readAsText(file);
  };
  inp.click();
}
function delHtmlDoc(id){
  if(!confirm('Deletar este resumo HTML?'))return;
  if(_htmlDocId===id)_htmlDocId=null;
  updSem(s=>({...s,htmlDocs:(s.htmlDocs||[]).filter(d=>d.id!==id)}));
}

function rCaderno(){
  const s=sem();let pages=s.pages||[];
  if(!pages.length){
    const p={id:uid(),name:'Página 1'};
    A.sems=A.sems.map(x=>x.id===s.id?{...x,pages:[p]}:x);lsSave();pages=[p];
  }
  if(_pi>=pages.length)_pi=0;
  const page=pages[_pi];
  setTimeout(()=>initCvs(s,page),40);
  const COLS=['#2E1065','#6030A8','#9A6238','#B83232','#276A47','#0E6B9A','#A85F00','#D4A0D4','#1a1a1a','#FFFFFF'];
  const SIZES=[2,4,7,13,22];
  return`<div style="position:relative;margin:-24px -26px 24px;padding:32px 40px 28px;background:linear-gradient(135deg,var(--p8) 0%,var(--p6) 60%,var(--p5) 100%);overflow:hidden"><div style="position:absolute;bottom:-20px;right:-10px;font-family:'Playfair Display',serif;font-size:100px;font-weight:700;color:#fff;opacity:.04;line-height:1;pointer-events:none;user-select:none;letter-spacing:-.02em">caderno</div><div style="position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;border:1px solid #fff;opacity:.07;pointer-events:none"></div><div style="position:relative;z-index:2;animation:fadeUp .3s ease both"><div style="font-family:'Outfit',sans-serif;font-size:9px;font-weight:400;color:var(--r2);letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px;opacity:.7">Suas anotações</div><div style="font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:#fff;line-height:1.1">Caderno</div></div></div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;flex-wrap:wrap;gap:7px">
    <h2 class="stitle" style="margin:0" style="display:none">Caderno</h2>
    <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">
      ${pages.map((p,i)=>`<button class="btn btn-sm" style="${i===_pi?'background:var(--p6);color:#fff':'background:var(--sur);border:1px solid var(--bd);color:var(--t2)'}" onclick="pgSwitch(${i})">${esc(p.name)}</button>`).join('')}
      <button class="btn btn-sm btn-o" onclick="pgAdd()" style="font-weight:700">+</button>
    </div>
  </div>
  <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:7px 11px;background:var(--sur);border:1px solid var(--bdl);border-radius:9px;margin-bottom:8px">
    <div style="display:flex;gap:3px">
      <button class="btn btn-sm ${_ctool==='pen'?'btn-p':'btn-o'}" onclick="setCtool('pen')">✏ Caneta</button>
      <button class="btn btn-sm ${_ctool==='hl'?'btn-p':'btn-o'}" onclick="setCtool('hl')">🟡 Realce</button>
      <button class="btn btn-sm ${_ctool==='eraser'?'btn-p':'btn-o'}" onclick="setCtool('eraser')">◻ Borracha</button>
    </div>
    <div style="width:1px;background:var(--bd);height:20px"></div>
    <div style="display:flex;gap:5px;align-items:center">
      ${COLS.map(c=>`<div onclick="setPcol('${c}')" style="width:18px;height:18px;border-radius:50%;background:${c};cursor:pointer;outline:${_pcol===c?'2.5px solid var(--p7)':'1.5px solid var(--bd)'};outline-offset:1.5px;flex-shrink:0;transition:transform .1s;${c==='#FFFFFF'?'border:1px solid var(--bd)':''}" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform=''"></div>`).join('')}
    </div>
    <div style="width:1px;background:var(--bd);height:20px"></div>
    <div style="display:flex;gap:4px;align-items:center">
      ${SIZES.map(sz=>`<button onclick="setPsz(${sz})" title="${sz}px" style="width:27px;height:27px;border-radius:50%;background:${_psz===sz?'var(--p6)':'var(--sur)'};border:1.5px solid ${_psz===sz?'var(--p6)':'var(--bd)'};cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s">
        <div style="width:${Math.min(sz,13)}px;height:${Math.min(sz,13)}px;border-radius:50%;background:${_psz===sz?'#fff':'var(--t2)'}"></div>
      </button>`).join('')}
    </div>
    <div style="width:1px;background:var(--bd);height:20px"></div>
    <div style="display:flex;gap:4px;margin-left:auto;flex-wrap:wrap">
      <button class="btn btn-sm btn-o" onclick="cvUndo()">↩ Desfazer</button>
      <button class="btn btn-sm btn-o" onclick="cvClear()">🗑 Limpar</button>
      <button class="btn btn-sm btn-o" onclick="cvExport()">⬇ PNG</button>
      ${pages.length>1?`<button class="btn btn-sm btn-d" onclick="pgDel()">✕ Página</button>`:''}
    </div>
  </div>
  <div id="cv-wrap" style="background:#FFF;border:1px solid var(--bdl);border-radius:10px;overflow:hidden;cursor:crosshair;box-shadow:0 2px 12px rgba(46,16,101,.06)">
    <canvas id="cv" style="display:block;touch-action:none"></canvas>
  </div>
  <div style="text-align:right;font-size:10px;color:var(--t3);margin-top:5px">Salvo automaticamente · exporte como PNG para compartilhar</div>`;
}

function initCvs(s,page){
  const cvs=document.getElementById('cv');if(!cvs)return;
  _cvs=cvs;
  const wrap=document.getElementById('cv-wrap');
  const W=wrap?wrap.clientWidth:880,H=Math.max(500,Math.floor(W*.6));
  cvs.width=W;cvs.height=H;
  _ctx=cvs.getContext('2d');
  _ctx.fillStyle='#FFFFFF';_ctx.fillRect(0,0,W,H);
  // Subtle grid
  _ctx.strokeStyle='#F0EAE2';_ctx.lineWidth=0.5;
  for(let x=40;x<W;x+=40){_ctx.beginPath();_ctx.moveTo(x,0);_ctx.lineTo(x,H);_ctx.stroke();}
  for(let y=40;y<H;y+=40){_ctx.beginPath();_ctx.moveTo(0,y);_ctx.lineTo(W,y);_ctx.stroke();}
  // Load saved
  const saved=pgLoad(pk(s.id,page.id));
  if(saved){const img=new Image();img.onload=()=>{_ctx.drawImage(img,0,0,W,H);_history=[cvs.toDataURL('image/jpeg',.75)];};img.src=saved;}
  else _history=[cvs.toDataURL('image/jpeg',.75)];
  // Events
  cvs.onmousedown=e=>cvStart(e);
  cvs.onmousemove=e=>cvDraw(e);
  cvs.onmouseup=()=>cvEnd(s,page);
  cvs.onmouseleave=()=>cvEnd(s,page);
  cvs.ontouchstart=e=>{e.preventDefault();cvStart(e.touches[0]);};
  cvs.ontouchmove=e=>{e.preventDefault();cvDraw(e.touches[0]);};
  cvs.ontouchend=e=>{e.preventDefault();cvEnd(s,page);};
}
function cvXY(e){const r=_cvs.getBoundingClientRect();return{x:(e.clientX-r.left)*(_cvs.width/r.width),y:(e.clientY-r.top)*(_cvs.height/r.height)};}
function cvStart(e){
  _drawing=true;const p=cvXY(e);_lx=p.x;_ly=p.y;_dirty=true;
  if(_history.length>12)_history.shift();
  _history.push(_cvs.toDataURL('image/jpeg',.75));
}
function cvDraw(e){
  if(!_drawing||!_ctx)return;
  const p=cvXY(e);
  _ctx.beginPath();
  if(_ctool==='eraser'){_ctx.globalCompositeOperation='destination-out';_ctx.strokeStyle='rgba(0,0,0,1)';_ctx.lineWidth=_psz*5;}
  else if(_ctool==='hl'){_ctx.globalCompositeOperation='source-over';_ctx.strokeStyle=_pcol+'60';_ctx.lineWidth=_psz*4;}
  else{_ctx.globalCompositeOperation='source-over';_ctx.strokeStyle=_pcol;_ctx.lineWidth=_psz;}
  _ctx.lineCap='round';_ctx.lineJoin='round';
  _ctx.moveTo(_lx,_ly);_ctx.lineTo(p.x,p.y);_ctx.stroke();
  _lx=p.x;_ly=p.y;
}
function cvEnd(s,page){
  if(!_drawing)return;_drawing=false;
  if(_ctx)_ctx.globalCompositeOperation='source-over';
  if(_dirty){cvAutoSave(s,page);_dirty=false;}
}
function cvAutoSave(s,page){if(!_cvs)return;try{pgSave(pk(s.id,page.id),_cvs.toDataURL('image/jpeg',.68));}catch(err){}}
function setCtool(t){_ctool=t;rMain();}
function setPcol(c){_pcol=c;rMain();}
function setPsz(sz){_psz=sz;rMain();}
function cvUndo(){
  if(_history.length<=1||!_ctx||!_cvs)return;
  _history.pop();
  const img=new Image();
  img.onload=()=>{
    _ctx.clearRect(0,0,_cvs.width,_cvs.height);
    _ctx.drawImage(img,0,0,_cvs.width,_cvs.height);
    const s=sem(),pages=s.pages||[];
    if(_pi<pages.length)cvAutoSave(s,pages[_pi]);
  };
  img.src=_history[_history.length-1];
}
function cvClear(){
  if(!confirm('Limpar esta página?')||!_ctx||!_cvs)return;
  _history=[];
  _ctx.fillStyle='#FFFFFF';_ctx.fillRect(0,0,_cvs.width,_cvs.height);
  _ctx.strokeStyle='#F0EAE2';_ctx.lineWidth=0.5;
  for(let x=40;x<_cvs.width;x+=40){_ctx.beginPath();_ctx.moveTo(x,0);_ctx.lineTo(x,_cvs.height);_ctx.stroke();}
  for(let y=40;y<_cvs.height;y+=40){_ctx.beginPath();_ctx.moveTo(0,y);_ctx.lineTo(_cvs.width,y);_ctx.stroke();}
  const s=sem(),pages=s.pages||[];if(_pi<pages.length)cvAutoSave(s,pages[_pi]);
}
function cvExport(){
  if(!_cvs)return;
  const a=document.createElement('a');
  a.download=(sem().pages?.[_pi]?.name||'pagina')+'.png';
  a.href=_cvs.toDataURL('image/png');a.click();
}
function pgSwitch(i){
  if(_dirty&&_cvs){const s=sem(),pages=s.pages||[];if(_pi<pages.length)cvAutoSave(s,pages[_pi]);}
  _pi=i;_history=[];rMain();
}
function pgAdd(){
  const n=prompt('Nome da página:','Página '+((sem().pages?.length||0)+1));
  if(!n?.trim())return;
  const p={id:uid(),name:n.trim()};
  updSem(s=>({...s,pages:[...(s.pages||[]),p]}));
  _pi=(sem().pages?.length||1)-1;rMain();
}
function pgDel(){
  const s=sem(),pages=s.pages||[];
  if(pages.length<=1){alert('Precisa ter ao menos uma página.');return;}
  if(!confirm('Deletar "'+pages[_pi].name+'"?'))return;
  try{localStorage.removeItem(pk(s.id,pages[_pi].id));}catch{}
  updSem(s=>({...s,pages:s.pages.filter((_,i)=>i!==_pi)}));
  if(_pi>=(sem().pages?.length||1))_pi=0;
  rMain();
}

// ═══════════════════════════════════════════════════════════════════════════════
// EXPORT / IMPORT — backup sem perder dados entre atualizações
// ═══════════════════════════════════════════════════════════════════════════════
function exportData(){
  const mainData=localStorage.getItem(SK)||'{}';
  const pageData={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith(PK)){pageData[k]=localStorage.getItem(k);}
  }
  const blob=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),mainData,pageData},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='academico_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(a.href);
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=ev=>{
    const file=ev.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data.mainData){alert('Arquivo inválido ou corrompido.');return;}
        if(!confirm('Isso vai substituir todos os dados atuais pelo backup. Continuar?'))return;
        localStorage.setItem(SK,data.mainData);
        if(data.pageData){Object.entries(data.pageData).forEach(([k,v])=>localStorage.setItem(k,v));}
        const st=lsLoad();
        if(st){A.sems=st.sems;A.activeId=st.activeId;}
        render();
        alert('✓ Dados importados com sucesso!');
      }catch(err){alert('Erro ao importar: '+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

// Migrate any purple/violet subject colors to wine palette
(function migrateColors(){
  const wineColors=['#8B1E38','#A63050','#C4728A','#6B3A2A','#9A4A1E','#2D5A3D','#1A4A6B','#5A3A6B'];
  function isViolet(hex){
    if(!hex||hex[0]!=='#')return false;
    const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    // Purple/violet: blue and red both high, green low
    return b>100&&r>60&&g<120&&b>r*0.6;
  }
  const stored=lsLoad();
  if(!stored)return;
  let changed=false;
  stored.sems.forEach(s=>(s.subjects||[]).forEach((sub,i)=>{
    if(isViolet(sub.color)){
      sub.color=wineColors[i%wineColors.length];
      changed=true;
    }
  }));
  if(changed)lsSave(stored);
})();

render();
